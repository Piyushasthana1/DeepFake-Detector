<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">DeepFake Detector</a>

    <div>
        <a href="/about" class="btn btn-outline-light me-2">About</a>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <h2>Welcome, {{ username }} 👋</h2>

    <div class="card p-4 mt-3">
        <form method="POST" enctype="multipart/form-data">
            <input class="form-control mb-3" type="file" name="video" required>
            <button class="btn btn-primary">Analyze Video</button>
        </form>
    </div>

</div>

</body>
</html>
